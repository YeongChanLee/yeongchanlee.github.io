<!DOCTYPE html>
<html>
<head>
	<title>R Tutorial</title>
	<style>
	/* Style the menu on the left */
	#menu {
		float: left;
		width: 200px;
		margin-right: 20px;
	}
	#menu ul {
		list-style: none;
		padding: 0;
		margin: 0;
	}
	#menu ul li {
		padding: 5px;
		background-color: #eee;
		margin-bottom: 5px;
	}
	#menu ul li a {
		text-decoration: none;
		color: #333;
	}
	#menu ul li a.active {
		font-weight: bold;
	}
	/* Style the tutorial page on the right */
	#tutorial {
		float: left;
		width: 600px;
	}
	</style>
	<script>
	// Script to highlight the active link on the menu
	window.onload = function() {
		var links = document.querySelectorAll("#menu ul li a");
		for (var i = 0; i < links.length; i++) {
			if (links[i].href === window.location.href) {
				links[i].classList.add("active");
			}
		}
	};
	</script>
</head>
<body>
	<div id="menu">
		<ul>
			<li><a href="tutorial01.html" target="tutorial">Tutorial 1</a></li>
			<li><a href="tutorial02.html" target="tutorial">Tutorial 2</a></li>
			<li><a href="tutorial3.html" target="tutorial">Tutorial 3</a></li>
			<li><a href="chapter1.html" target="tutorial">Chapter 1</a></li>
			<li><a href="chapter2.html" target="tutorial">Chapter 2</a></li>
			<li><a href="chapter3.html" target="tutorial">Chapter 3</a></li>
			<li><a href="subchapter1.html" target="tutorial">Subchapter 1</a></li>
			<li><a href="subchapter2.html" target="tutorial">Subchapter 2</a></li>
			<li><a href="subchapter3.html" target="tutorial">Subchapter 3</a></li>
		</ul>
	</div>
	<div id="tutorial">
		<!-- Insert your tutorial page content here -->
	</div>
</body>
</html>
